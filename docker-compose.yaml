version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: fluxoalpha-postgres
    environment:
      POSTGRES_DB: webhook_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: